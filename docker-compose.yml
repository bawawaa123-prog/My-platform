services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: docker
      SECRET_KEY: ${SECRET_KEY:-replace-with-a-local-dev-secret}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/storage/app.db}
      KNOWLEDGE_UPLOAD_DIR: /app/storage/uploads/knowledge
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fake}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-fake-embedding-v1}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-64}
      VECTOR_STORE_PATH: /app/storage/data/knowledge_vector_store.json
    command: >
      sh -c "python -m app.db.init_db &&
      python scripts/seed_data.py &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data = json.load(urllib.request.urlopen('http://127.0.0.1:8000/health')); assert data.get('status') == 'ok'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_support_agent}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-enterprise_support_agent}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  backend_storage:
  postgres_data:
  redis_data:
